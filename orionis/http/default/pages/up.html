<!DOCTYPE html>
<html lang="{{locale}}">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Health | {{app_name}}</title>
    <link rel="shortcut icon" href="favicon.ico" type="image/x-icon">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes pulseGlow {

            0%,
            100% {
                box-shadow: 0 0 8px rgba(34, 197, 94, 0.6);
            }

            50% {
                box-shadow: 0 0 20px rgba(34, 197, 94, 0.8);
            }
        }

        .animate-fadeInUp {
            animation: fadeInUp 0.8s ease-out;
        }

        .animate-pulseGlow {
            animation: pulseGlow 2s infinite;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .status-indicator {
            background: linear-gradient(45deg, #10b981, #22c55e);
            box-shadow: 0 0 20px rgba(34, 197, 94, 0.4);
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background: linear-gradient(135deg, #1F4E79 0%, #F2C230 100%);
            background-attachment: fixed;
        }

        .bg-grid {
            background-image: radial-gradient(circle at 2px 2px, rgba(255, 255, 255, 0.1) 1px, transparent 0);
            background-size: 40px 40px;
        }
    </style>
</head>

<body class="antialiased overflow-hidden">
    <div class="relative flex justify-center items-center min-h-screen bg-grid">
        <div class="absolute top-20 left-20 w-32 h-32 bg-white/10 rounded-full blur-xl animate-pulse"></div>
        <div class="absolute bottom-20 right-20 w-24 h-24 bg-white/5 rounded-full blur-lg animate-pulse delay-1000">
        </div>
        <div class="absolute top-1/2 left-10 w-16 h-16 bg-white/10 rounded-full blur-md animate-pulse delay-500"></div>
        <div class="w-full sm:w-3/4 xl:w-1/2 mx-auto p-6 animate-fadeInUp">
            <div
                class="glass-card px-8 py-6 rounded-2xl shadow-2xl hover:shadow-3xl transition-all duration-500 flex items-center group hover:scale-[1.02] transform">
                <div class="relative flex h-4 w-4">
                    <span
                        class="animate-ping absolute inline-flex h-full w-full rounded-full bg-gradient-to-r from-emerald-400 to-green-500 opacity-75"></span>
                    <span class="relative inline-flex rounded-full h-4 w-4 status-indicator animate-pulseGlow"></span>
                </div>
                <div class="ml-8 flex-1">
                    <h2 class="text-2xl font-semibold text-gray-800 mb-2 tracking-tight">
                        <span class="bg-gradient-to-r from-gray-800 to-gray-600 bg-clip-text text-transparent">
                            Application Online
                        </span>
                    </h2>
                    <div class="space-y-2">
                        <p class="text-gray-600 text-sm font-medium flex items-center">
                            <svg class="w-4 h-4 mr-2 text-green-500" fill="currentColor" viewBox="0 0 20 20">
                                <path fill-rule="evenodd"
                                    d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z"
                                    clip-rule="evenodd"></path>
                            </svg>
                            HTTP request processed successfully
                        </p>
                        <p class="text-gray-500 text-sm flex items-center">
                            <svg class="w-4 h-4 mr-2 text-blue-500" fill="none" stroke="currentColor"
                                viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                            </svg>
                            Response rendered in
                            <span
                                class="font-mono ml-1 px-2 py-0.5 bg-blue-50 text-blue-700 rounded-md text-xs font-medium">
                                {{time}} ms
                            </span>
                        </p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
