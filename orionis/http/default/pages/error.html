<!DOCTYPE html>
<html lang="{{locale}}">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{error}} | {{app_name}}</title>
    <link rel="shortcut icon" href="favicon.ico" type="image/x-icon">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes gentleGlow {

            0%,
            100% {
                text-shadow:
                    0 0 10px rgba(239, 68, 68, 0.6),
                    0 2px 4px rgba(0, 0, 0, 0.3);
            }

            50% {
                text-shadow:
                    0 0 15px rgba(239, 68, 68, 0.8),
                    0 2px 4px rgba(0, 0, 0, 0.3);
            }
        }

        .animate-fadeInUp {
            animation: fadeInUp 1s ease-out;
        }

        .error-code {
            font-family: 'Montserrat', sans-serif;
            font-size: 12rem;
            font-weight: 900;
            color: #ef4444;
            letter-spacing: -0.1em;
            animation: gentleGlow 3s infinite ease-in-out;
            user-select: none;
            line-height: 1;
        }

        .error-code span {
            display: inline-block;
            background: linear-gradient(135deg, #dc2626 0%, #ef4444 50%, #f87171 100%);
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 2px 4px rgba(0, 0, 0, 0.2));
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background: linear-gradient(135deg, #1F4E79 0%, #F2C230 100%);
            background-attachment: fixed;
        }

        .bg-grid {
            background-image: radial-gradient(circle at 2px 2px, rgba(255, 255, 255, 0.1) 1px, transparent 0);
            background-size: 40px 40px;
        }

        @media only screen and (max-width: 768px) {
            .error-code {
                font-size: 8rem;
            }
        }

        @media only screen and (max-width: 480px) {
            .error-code {
                font-size: 6rem;
                letter-spacing: -0.05em;
            }
        }
    </style>
</head>

<body class="antialiased overflow-hidden">
    <div class="relative flex flex-col justify-center items-center min-h-screen bg-grid">
        <div class="absolute top-20 left-20 w-32 h-32 bg-white/10 rounded-full blur-xl animate-pulse"></div>
        <div class="absolute bottom-20 right-20 w-24 h-24 bg-white/5 rounded-full blur-lg animate-pulse delay-1000">
        </div>
        <div class="absolute top-1/2 left-10 w-16 h-16 bg-white/10 rounded-full blur-md animate-pulse delay-500"></div>
        <div class="w-full sm:w-3/4 xl:w-2/3 mx-auto p-6 animate-fadeInUp">
            <div class="text-center mb-8">
                <div class="error-code">
                    <span>{{0}}</span><span>{{1}}</span><span>{{2}}</span>
                </div>
                <p class="text-white/80 text-xl font-medium mt-8 animate-fadeInUp" style="animation-delay: 0.3s;">
                    {{description}}</p>
            </div>
        </div>
    </div>
</body>

</html>
