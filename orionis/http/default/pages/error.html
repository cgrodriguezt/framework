<!DOCTYPE html>
<html lang="{{locale}}">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{error}} | {{app_name}}</title>
    <link rel="shortcut icon" href="favicon.ico" type="image/x-icon">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        /* ===== CSS VARIABLES ===== */
        :root {
            --bg-deep: #060a13;
            --bg-panel: #0b1022;
            --bg-card: #0d1429;
            --cyan: #00e5ff;
            --cyan-dim: rgba(0, 229, 255, 0.15);
            --cyan-glow: rgba(0, 229, 255, 0.4);
            --yellow: #f2c230;
            --yellow-dim: rgba(242, 194, 48, 0.15);
            --yellow-glow: rgba(242, 194, 48, 0.4);
            --red: #ff3b3b;
            --red-dim: rgba(255, 59, 59, 0.15);
            --red-glow: rgba(255, 59, 59, 0.4);
            --green: #00ff88;
            --green-dim: rgba(0, 255, 136, 0.15);
            --text-primary: rgba(255, 255, 255, 0.92);
            --text-secondary: rgba(255, 255, 255, 0.55);
            --text-dim: rgba(255, 255, 255, 0.3);
            --border: rgba(0, 229, 255, 0.12);
            --font-display: 'Orbitron', sans-serif;
            --font-mono: 'Share Tech Mono', monospace;
        }

        /* ===== RESET & BASE ===== */
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: var(--font-mono);
            background: var(--bg-deep);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* ===== DOT GRID BACKGROUND ===== */
        .grid-bg {
            position: fixed;
            inset: 0;
            background-image: radial-gradient(circle at 1.5px 1.5px, rgba(0, 229, 255, 0.06) 1px, transparent 0);
            background-size: 32px 32px;
            pointer-events: none;
            z-index: 0;
        }

        /* ===== SCANLINE OVERLAY ===== */
        .scanline-overlay {
            position: fixed;
            inset: 0;
            background: repeating-linear-gradient(
                0deg,
                transparent,
                transparent 2px,
                rgba(0, 229, 255, 0.015) 2px,
                rgba(0, 229, 255, 0.015) 4px
            );
            pointer-events: none;
            z-index: 9999;
            animation: scanlineShift 8s linear infinite;
        }

        @keyframes scanlineShift {
            0% { transform: translateY(0); }
            100% { transform: translateY(4px); }
        }

        /* ===== AMBIENT PARTICLES ===== */
        .particle {
            position: fixed;
            border-radius: 50%;
            pointer-events: none;
            z-index: 1;
            animation: particleFloat linear infinite;
            opacity: 0;
        }

        @keyframes particleFloat {
            0% { opacity: 0; transform: translateY(0) scale(0.5); }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { opacity: 0; transform: translateY(-100vh) scale(1); }
        }

        /* ===== TOPBAR ===== */
        .topbar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 24px;
            height: 40px;
            background: rgba(6, 10, 19, 0.85);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border);
            font-size: 11px;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: var(--text-dim);
        }

        .topbar-status {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .topbar-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--red);
            box-shadow: 0 0 6px var(--red-glow);
            animation: pulse-dot 2s ease-in-out infinite;
        }

        @keyframes pulse-dot {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        .topbar-time {
            color: var(--cyan);
            font-family: var(--font-mono);
        }

        /* ===== MAIN LAYOUT ===== */
        .main-container {
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 60px 20px 40px;
        }

        /* ===== HUD CARD ===== */
        .hud-card {
            position: relative;
            background: linear-gradient(165deg, var(--bg-card) 0%, var(--bg-panel) 100%);
            border: 1px solid var(--border);
            padding: 2px;
            max-width: 820px;
            width: 100%;
            animation: cardFadeIn 0.8s ease-out;
        }

        .hud-card::before,
        .hud-card::after {
            content: '';
            position: absolute;
            width: 20px;
            height: 20px;
            border-color: var(--cyan);
            border-style: solid;
            z-index: 5;
        }

        .hud-card::before {
            top: -1px;
            left: -1px;
            border-width: 2px 0 0 2px;
        }

        .hud-card::after {
            top: -1px;
            right: -1px;
            border-width: 2px 2px 0 0;
        }

        .hud-card-inner::before,
        .hud-card-inner::after {
            content: '';
            position: absolute;
            width: 20px;
            height: 20px;
            border-color: var(--cyan);
            border-style: solid;
            z-index: 5;
        }

        .hud-card-inner::before {
            bottom: -1px;
            left: -1px;
            border-width: 0 0 2px 2px;
        }

        .hud-card-inner::after {
            bottom: -1px;
            right: -1px;
            border-width: 0 2px 2px 0;
        }

        .hud-card-inner {
            position: relative;
            padding: 40px;
        }

        @keyframes cardFadeIn {
            from { opacity: 0; transform: translateY(20px) scale(0.98); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        /* ===== CARD HEADER LABEL ===== */
        .card-header-label {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 32px;
            padding-bottom: 16px;
            border-bottom: 1px solid var(--border);
        }

        .system-label {
            font-family: var(--font-mono);
            font-size: 11px;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: var(--text-dim);
        }

        .status-badge {
            display: flex;
            align-items: center;
            gap: 6px;
            font-family: var(--font-mono);
            font-size: 10px;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            padding: 4px 12px;
            border: 1px solid var(--red-dim);
            background: var(--red-dim);
            color: var(--red);
        }

        .status-badge-dot {
            width: 5px;
            height: 5px;
            border-radius: 50%;
            background: var(--red);
            animation: pulse-dot 1.5s ease-in-out infinite;
        }

        /* ===== ERROR CODE ===== */
        .error-code-container {
            text-align: center;
            margin-bottom: 8px;
        }

        .error-code {
            font-family: var(--font-display);
            font-size: 10rem;
            font-weight: 900;
            line-height: 1;
            letter-spacing: 0.05em;
            user-select: none;
            position: relative;
            display: inline-block;
        }

        .error-code .digit {
            display: inline-block;
            position: relative;
            background: linear-gradient(180deg, var(--cyan) 0%, #0088aa 100%);
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 20px var(--cyan-glow)) drop-shadow(0 0 60px rgba(0, 229, 255, 0.15));
            animation: digitFlicker 4s ease-in-out infinite;
        }

        .error-code .digit:nth-child(2) { animation-delay: 0.3s; }
        .error-code .digit:nth-child(3) { animation-delay: 0.6s; }

        @keyframes digitFlicker {
            0%, 100% { opacity: 1; }
            92% { opacity: 1; }
            93% { opacity: 0.6; }
            94% { opacity: 1; }
            96% { opacity: 0.8; }
            97% { opacity: 1; }
        }

        /* ===== ERROR TITLE ===== */
        .error-title {
            text-align: center;
            font-family: var(--font-display);
            font-size: 1.1rem;
            font-weight: 700;
            letter-spacing: 0.3em;
            text-transform: uppercase;
            color: var(--yellow);
            text-shadow: 0 0 15px var(--yellow-glow);
            margin-bottom: 12px;
        }

        /* ===== DESCRIPTION ===== */
        .error-description {
            text-align: center;
            font-size: 14px;
            color: var(--text-secondary);
            line-height: 1.7;
            max-width: 500px;
            margin: 0 auto 36px;
            letter-spacing: 0.03em;
        }

        /* ===== STATUS PANEL ===== */
        .status-panel {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-bottom: 36px;
        }

        .status-item {
            position: relative;
            background: rgba(0, 229, 255, 0.03);
            border: 1px solid var(--border);
            padding: 14px 16px;
            overflow: hidden;
        }

        .status-item::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 3px;
            height: 100%;
        }

        .status-item:nth-child(1)::before { background: var(--red); box-shadow: 0 0 8px var(--red-glow); }
        .status-item:nth-child(2)::before { background: var(--yellow); box-shadow: 0 0 8px var(--yellow-glow); }
        .status-item:nth-child(3)::before { background: var(--cyan); box-shadow: 0 0 8px var(--cyan-glow); }

        .status-item-label {
            font-size: 9px;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: var(--text-dim);
            margin-bottom: 6px;
        }

        .status-item-value {
            font-family: var(--font-display);
            font-size: 12px;
            font-weight: 600;
            letter-spacing: 0.1em;
        }

        .status-item:nth-child(1) .status-item-value { color: var(--red); }
        .status-item:nth-child(2) .status-item-value { color: var(--yellow); }
        .status-item:nth-child(3) .status-item-value { color: var(--cyan); }

        /* ===== DIAGNOSTIC LINE ===== */
        .diagnostic-line {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 32px;
            padding: 12px 16px;
            background: rgba(255, 59, 59, 0.04);
            border: 1px solid rgba(255, 59, 59, 0.1);
            font-size: 12px;
            color: var(--text-secondary);
        }

        .diagnostic-icon {
            flex-shrink: 0;
            width: 18px;
            height: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .diagnostic-icon svg {
            width: 16px;
            height: 16px;
        }

        .diagnostic-text {
            letter-spacing: 0.05em;
        }

        .diagnostic-text span {
            color: var(--cyan);
        }

        /* ===== LOG OUTPUT ===== */
        .log-output {
            margin-bottom: 32px;
            padding: 14px 18px;
            background: rgba(0, 0, 0, 0.35);
            border: 1px solid var(--border);
            font-size: 11px;
            line-height: 1.9;
            color: var(--text-dim);
            overflow: hidden;
        }

        .log-output .log-line {
            opacity: 0;
            animation: logAppear 0.3s ease-out forwards;
        }

        .log-output .log-prefix {
            color: var(--cyan);
            margin-right: 4px;
        }

        .log-output .log-warn { color: var(--yellow); }
        .log-output .log-err { color: var(--red); }
        .log-output .log-ok { color: var(--green); }

        @keyframes logAppear {
            from { opacity: 0; transform: translateX(-8px); }
            to { opacity: 1; transform: translateX(0); }
        }

        /* ===== BUTTONS ===== */
        .btn-group {
            display: flex;
            gap: 12px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn {
            position: relative;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 12px 24px;
            font-family: var(--font-display);
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            text-decoration: none;
            border: 1px solid;
            cursor: pointer;
            transition: all 0.3s ease;
            overflow: hidden;
            background: transparent;
        }

        .btn::before {
            content: '';
            position: absolute;
            inset: 0;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .btn-primary {
            color: var(--cyan);
            border-color: var(--cyan);
        }

        .btn-primary::before {
            background: linear-gradient(135deg, rgba(0, 229, 255, 0.1) 0%, rgba(0, 229, 255, 0.03) 100%);
        }

        .btn-primary:hover {
            box-shadow: 0 0 20px var(--cyan-glow), inset 0 0 20px rgba(0, 229, 255, 0.05);
            text-shadow: 0 0 10px var(--cyan-glow);
        }

        .btn-primary:hover::before { opacity: 1; }

        .btn-secondary {
            color: var(--yellow);
            border-color: rgba(242, 194, 48, 0.3);
        }

        .btn-secondary::before {
            background: linear-gradient(135deg, rgba(242, 194, 48, 0.08) 0%, rgba(242, 194, 48, 0.02) 100%);
        }

        .btn-secondary:hover {
            border-color: var(--yellow);
            box-shadow: 0 0 20px var(--yellow-glow), inset 0 0 20px rgba(242, 194, 48, 0.05);
            text-shadow: 0 0 10px var(--yellow-glow);
        }

        .btn-secondary:hover::before { opacity: 1; }

        .btn-ghost {
            color: var(--text-secondary);
            border-color: var(--border);
        }

        .btn-ghost:hover {
            color: var(--text-primary);
            border-color: rgba(255, 255, 255, 0.25);
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.05);
        }

        .btn svg {
            width: 14px;
            height: 14px;
            flex-shrink: 0;
        }

        /* ===== BOTTOM INDICATORS ===== */
        .bottom-bar {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 24px;
            margin-top: 28px;
            flex-wrap: wrap;
        }

        .indicator {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 10px;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: var(--text-dim);
        }

        .indicator-dot {
            width: 5px;
            height: 5px;
            border-radius: 50%;
        }

        .indicator-dot.red {
            background: var(--red);
            box-shadow: 0 0 6px var(--red-glow);
            animation: pulse-dot 2s ease-in-out infinite;
        }

        .indicator-dot.yellow {
            background: var(--yellow);
            box-shadow: 0 0 6px var(--yellow-glow);
            animation: pulse-dot 2.5s ease-in-out infinite;
        }

        .indicator-dot.green {
            background: var(--green);
            box-shadow: 0 0 6px rgba(0, 255, 136, 0.4);
        }

        .indicator-dot.cyan {
            background: var(--cyan);
            box-shadow: 0 0 6px var(--cyan-glow);
            animation: pulse-dot 3s ease-in-out infinite;
        }

        /* ===== NOISE OVERLAY ===== */
        .noise-overlay {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 9998;
            opacity: 0.025;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
            background-repeat: repeat;
            background-size: 256px 256px;
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 768px) {
            .error-code { font-size: 7rem; }
            .error-title { font-size: 0.9rem; letter-spacing: 0.2em; }
            .hud-card-inner { padding: 28px 20px; }
            .status-panel { grid-template-columns: 1fr; }
            .btn-group { flex-direction: column; align-items: stretch; }
            .btn { justify-content: center; }
            .bottom-bar { gap: 14px; }
        }

        @media (max-width: 480px) {
            .error-code { font-size: 5rem; letter-spacing: 0; }
            .error-title { font-size: 0.75rem; }
            .card-header-label { flex-direction: column; gap: 8px; align-items: flex-start; }
            .topbar { font-size: 9px; padding: 0 12px; }
        }

        /* ===== GLOW LINE SEPARATOR ===== */
        .glow-line {
            width: 100%;
            height: 1px;
            background: linear-gradient(90deg, transparent 0%, var(--cyan) 50%, transparent 100%);
            opacity: 0.3;
            margin: 8px 0 28px;
        }

        /* ===== RETRYING ANIMATION ===== */
        .retrying-bar {
            width: 100%;
            height: 2px;
            background: var(--bg-card);
            margin-bottom: 32px;
            overflow: hidden;
            border-radius: 1px;
        }

        .retrying-bar-fill {
            width: 30%;
            height: 100%;
            background: linear-gradient(90deg, transparent, var(--cyan), transparent);
            animation: retrySlide 2s ease-in-out infinite;
        }

        @keyframes retrySlide {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(433%); }
        }
    </style>
</head>

<body>
    <!-- Background layers -->
    <div class="grid-bg"></div>
    <div class="noise-overlay"></div>
    <div class="scanline-overlay"></div>

    <!-- Floating particles (injected by JS) -->
    <div id="particles"></div>

    <!-- Top system bar -->
    <div class="topbar">
        <div class="topbar-status">
            <div class="topbar-dot"></div>
            <span>SYS.ERROR</span>
            <span style="margin-left: 12px; color: rgba(255,255,255,0.2);">NAV:HALTED</span>
        </div>
        <div class="topbar-time" id="systemTime"></div>
    </div>

    <!-- Main content -->
    <div class="main-container">
        <div class="hud-card">
            <div class="hud-card-inner">

                <!-- Card header -->
                <div class="card-header-label">
                    <span class="system-label">SYS.FAILURE &mdash; {{app_name}}</span>
                    <div class="status-badge">
                        <div class="status-badge-dot"></div>
                        <span>CRITICAL</span>
                    </div>
                </div>

                <!-- Error code -->
                <div class="error-code-container">
                    <div class="error-code">
                        <span class="digit">{{0}}</span><span class="digit">{{1}}</span><span class="digit">{{2}}</span>
                    </div>
                </div>

                <!-- Error title -->
                <div class="error-title" id="errorTitle">MISSION INTERRUPTED</div>

                <!-- Glow separator -->
                <div class="glow-line"></div>

                <!-- Description -->
                <div class="error-description">{{description}}</div>

                <!-- Retrying animation bar -->
                <div class="retrying-bar">
                    <div class="retrying-bar-fill"></div>
                </div>

                <!-- Diagnostic line -->
                <div class="diagnostic-line">
                    <div class="diagnostic-icon">
                        <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" style="color: var(--yellow);">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v2m0 4h.01M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/>
                        </svg>
                    </div>
                    <div class="diagnostic-text">
                        CAUTION: Response header returned status code <span>{{error}}</span>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <script>
        /* ===== SYSTEM CLOCK ===== */
        (function clock() {
            var el = document.getElementById('systemTime');
            function tick() {
                var now = new Date();
                el.textContent = now.toUTCString().split(' ').slice(4).join(' ').replace(' GMT', ' UTC');
            }
            tick();
            setInterval(tick, 1000);
        })();

        /* ===== DYNAMIC ERROR TITLE ===== */
        (function setTitle() {
            var code = '{{error}}';
            var c = Number.parseInt(code, 10);
            var titles = {
                400: 'MALFORMED TRANSMISSION',
                401: 'AUTHORIZATION REVOKED',
                403: 'ACCESS DENIED — RESTRICTED ZONE',
                404: 'TARGET NOT FOUND',
                405: 'PROTOCOL VIOLATION',
                408: 'SIGNAL TIMEOUT',
                429: 'RATE LIMITER ENGAGED',
                500: 'CRITICAL SYSTEM FAILURE',
                502: 'RELAY MALFUNCTION',
                503: 'SYSTEMS OFFLINE',
                504: 'UPLINK TIMEOUT'
            };
            var el = document.getElementById('errorTitle');
            if (titles[c]) el.textContent = titles[c];
            else if (c >= 500) el.textContent = 'SYSTEM FAILURE DETECTED';
            else if (c >= 400) el.textContent = 'MISSION INTERRUPTED';
        })();

        /* ===== FLOATING PARTICLES ===== */
        (function createParticles() {
            var container = document.getElementById('particles');
            var count = 12;
            for (var i = 0; i < count; i++) {
                var p = document.createElement('div');
                p.className = 'particle';
                var size = Math.random() * 3 + 1;
                p.style.width = size + 'px';
                p.style.height = size + 'px';
                p.style.left = Math.random() * 100 + '%';
                p.style.bottom = '-10px';
                p.style.background = Math.random() > 0.5 ? 'var(--cyan)' : 'rgba(255,255,255,0.4)';
                p.style.boxShadow = '0 0 ' + (size * 2) + 'px ' + (Math.random() > 0.5 ? 'var(--cyan-glow)' : 'rgba(255,255,255,0.2)');
                p.style.animationDuration = (Math.random() * 15 + 10) + 's';
                p.style.animationDelay = (Math.random() * 10) + 's';
                container.appendChild(p);
            }
        })();
    </script>
</body>

</html>
