<!DOCTYPE html>
<html lang="{{locale}}">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Maintenance | {{app_name}}</title>
    <link rel="shortcut icon" href="favicon.ico" type="image/x-icon">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        /* ===== CSS VARIABLES ===== */
        :root {
            --bg-deep: #060a13;
            --bg-panel: #0b1022;
            --bg-card: #0d1429;
            --cyan: #00e5ff;
            --cyan-dim: rgba(0, 229, 255, 0.15);
            --cyan-glow: rgba(0, 229, 255, 0.4);
            --yellow: #f2c230;
            --yellow-dim: rgba(242, 194, 48, 0.15);
            --yellow-glow: rgba(242, 194, 48, 0.4);
            --green: #00ff88;
            --green-dim: rgba(0, 255, 136, 0.15);
            --green-glow: rgba(0, 255, 136, 0.4);
            --red: #ff3b3b;
            --red-dim: rgba(255, 59, 59, 0.15);
            --red-glow: rgba(255, 59, 59, 0.4);
            --text-primary: rgba(255, 255, 255, 0.92);
            --text-secondary: rgba(255, 255, 255, 0.55);
            --text-dim: rgba(255, 255, 255, 0.3);
            --border: rgba(0, 229, 255, 0.12);
            --font-display: 'Orbitron', sans-serif;
            --font-mono: 'Share Tech Mono', monospace;
        }

        /* ===== RESET & BASE ===== */
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: var(--font-mono);
            background: var(--bg-deep);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* ===== DOT GRID BACKGROUND ===== */
        .grid-bg {
            position: fixed;
            inset: 0;
            background-image: radial-gradient(circle at 1.5px 1.5px, rgba(0, 229, 255, 0.06) 1px, transparent 0);
            background-size: 32px 32px;
            pointer-events: none;
            z-index: 0;
        }

        /* ===== SCANLINE OVERLAY ===== */
        .scanline-overlay {
            position: fixed;
            inset: 0;
            background: repeating-linear-gradient(
                0deg,
                transparent,
                transparent 2px,
                rgba(0, 229, 255, 0.015) 2px,
                rgba(0, 229, 255, 0.015) 4px
            );
            pointer-events: none;
            z-index: 9999;
            animation: scanlineShift 8s linear infinite;
        }

        @keyframes scanlineShift {
            0% { transform: translateY(0); }
            100% { transform: translateY(4px); }
        }

        /* ===== NOISE OVERLAY ===== */
        .noise-overlay {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 9998;
            opacity: 0.025;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
            background-repeat: repeat;
            background-size: 256px 256px;
        }

        /* ===== AMBIENT PARTICLES ===== */
        .particle {
            position: fixed;
            border-radius: 50%;
            pointer-events: none;
            z-index: 1;
            animation: particleFloat linear infinite;
            opacity: 0;
        }

        @keyframes particleFloat {
            0% { opacity: 0; transform: translateY(0) scale(0.5); }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { opacity: 0; transform: translateY(-100vh) scale(1); }
        }

        /* ===== TOPBAR ===== */
        .topbar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 24px;
            height: 40px;
            background: rgba(6, 10, 19, 0.85);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border);
            font-size: 11px;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: var(--text-dim);
        }

        .topbar-status {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .topbar-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--red);
            box-shadow: 0 0 6px var(--red-glow);
            animation: pulse-dot 2s ease-in-out infinite;
        }

        @keyframes pulse-dot {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        .topbar-time {
            color: var(--cyan);
            font-family: var(--font-mono);
        }

        /* ===== MAIN LAYOUT ===== */
        .main-container {
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 60px 20px 40px;
        }

        /* ===== HUD CARD ===== */
        .hud-card {
            position: relative;
            background: linear-gradient(165deg, var(--bg-card) 0%, var(--bg-panel) 100%);
            border: 1px solid var(--border);
            padding: 2px;
            max-width: 820px;
            width: 100%;
            animation: cardFadeIn 0.8s ease-out;
        }

        .hud-card::before,
        .hud-card::after {
            content: '';
            position: absolute;
            width: 20px;
            height: 20px;
            border-color: var(--red);
            border-style: solid;
            z-index: 5;
        }

        .hud-card::before {
            top: -1px;
            left: -1px;
            border-width: 2px 0 0 2px;
        }

        .hud-card::after {
            top: -1px;
            right: -1px;
            border-width: 2px 2px 0 0;
        }

        .hud-card-inner::before,
        .hud-card-inner::after {
            content: '';
            position: absolute;
            width: 20px;
            height: 20px;
            border-color: var(--red);
            border-style: solid;
            z-index: 5;
        }

        .hud-card-inner::before {
            bottom: -1px;
            left: -1px;
            border-width: 0 0 2px 2px;
        }

        .hud-card-inner::after {
            bottom: -1px;
            right: -1px;
            border-width: 0 2px 2px 0;
        }

        .hud-card-inner {
            position: relative;
            padding: 40px;
        }

        @keyframes cardFadeIn {
            from { opacity: 0; transform: translateY(20px) scale(0.98); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        /* ===== CARD HEADER ===== */
        .card-header-label {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 32px;
            padding-bottom: 16px;
            border-bottom: 1px solid var(--border);
        }

        .system-label {
            font-family: var(--font-mono);
            font-size: 11px;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: var(--text-dim);
        }

        .status-badge {
            display: flex;
            align-items: center;
            gap: 6px;
            font-family: var(--font-mono);
            font-size: 10px;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            padding: 4px 12px;
            border: 1px solid var(--red-dim);
            background: var(--red-dim);
            color: var(--red);
        }

        .status-badge-dot {
            width: 5px;
            height: 5px;
            border-radius: 50%;
            background: var(--red);
            animation: pulse-dot 1.5s ease-in-out infinite;
        }

        /* ===== STATUS CODE ===== */
        .status-code-container {
            text-align: center;
            margin-bottom: 8px;
        }

        .status-code {
            font-family: var(--font-display);
            font-size: 8rem;
            font-weight: 900;
            line-height: 1;
            letter-spacing: 0.05em;
            user-select: none;
            position: relative;
            display: inline-block;
        }

        .status-code .digit {
            display: inline-block;
            position: relative;
            background: linear-gradient(180deg, var(--red) 0%, #aa2222 100%);
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 20px var(--red-glow)) drop-shadow(0 0 60px rgba(255, 59, 59, 0.15));
            animation: digitFlicker 4s ease-in-out infinite;
        }

        .status-code .digit:nth-child(2) { animation-delay: 0.3s; }
        .status-code .digit:nth-child(3) { animation-delay: 0.6s; }

        @keyframes digitFlicker {
            0%, 100% { opacity: 1; }
            92% { opacity: 1; }
            93% { opacity: 0.5; }
            94% { opacity: 1; }
            96% { opacity: 0.7; }
            97% { opacity: 1; }
        }

        /* ===== STATUS TITLE ===== */
        .status-title {
            text-align: center;
            font-family: var(--font-display);
            font-size: 1.1rem;
            font-weight: 700;
            letter-spacing: 0.3em;
            text-transform: uppercase;
            color: var(--yellow);
            text-shadow: 0 0 15px var(--yellow-glow);
            margin-bottom: 12px;
        }

        /* ===== GLOW LINE ===== */
        .glow-line {
            width: 100%;
            height: 1px;
            background: linear-gradient(90deg, transparent 0%, var(--red) 50%, transparent 100%);
            opacity: 0.3;
            margin: 8px 0 28px;
        }

        /* ===== DESCRIPTION ===== */
        .status-description {
            text-align: center;
            font-size: 14px;
            color: var(--text-secondary);
            line-height: 1.7;
            max-width: 500px;
            margin: 0 auto 36px;
            letter-spacing: 0.03em;
        }

        /* ===== HEARTBEAT BAR ===== */
        .heartbeat-bar {
            width: 100%;
            height: 2px;
            background: var(--bg-card);
            margin-bottom: 32px;
            overflow: hidden;
            border-radius: 1px;
        }

        .heartbeat-bar-fill {
            width: 30%;
            height: 100%;
            background: linear-gradient(90deg, transparent, var(--red), transparent);
            animation: heartbeatSlide 2.5s ease-in-out infinite;
        }

        @keyframes heartbeatSlide {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(433%); }
        }

        /* ===== UPTIME RING ===== */
        .uptime-ring-container {
            display: flex;
            justify-content: center;
            margin-bottom: 32px;
        }

        .uptime-ring {
            position: relative;
            width: 120px;
            height: 120px;
        }

        .uptime-ring svg {
            transform: rotate(-90deg);
            width: 120px;
            height: 120px;
        }

        .uptime-ring-bg {
            fill: none;
            stroke: rgba(255, 59, 59, 0.08);
            stroke-width: 4;
        }

        .uptime-ring-fill {
            fill: none;
            stroke: var(--red);
            stroke-width: 4;
            stroke-linecap: round;
            stroke-dasharray: 339.292;
            stroke-dashoffset: 339.292;
            filter: drop-shadow(0 0 6px var(--red-glow));
            animation: ringFill 2s ease-out 0.5s forwards;
        }

        @keyframes ringFill {
            to { stroke-dashoffset: 339.292; }
        }

        .uptime-ring-label {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .uptime-ring-value {
            font-family: var(--font-display);
            font-size: 22px;
            font-weight: 700;
            color: var(--red);
            text-shadow: 0 0 10px var(--red-glow);
            line-height: 1;
            animation: digitFlicker 3s ease-in-out infinite;
        }

        .uptime-ring-unit {
            font-size: 9px;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: var(--text-dim);
            margin-top: 4px;
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 768px) {
            .status-code { font-size: 5.5rem; }
            .status-title { font-size: 0.9rem; letter-spacing: 0.2em; }
            .hud-card-inner { padding: 28px 20px; }
            .uptime-ring { width: 100px; height: 100px; }
            .uptime-ring svg { width: 100px; height: 100px; }
            .uptime-ring-fill, .uptime-ring-bg { stroke-width: 3; }
            .uptime-ring-value { font-size: 18px; }
        }

        @media (max-width: 480px) {
            .status-code { font-size: 4rem; letter-spacing: 0; }
            .status-title { font-size: 0.75rem; }
            .card-header-label { flex-direction: column; gap: 8px; align-items: flex-start; }
            .topbar { font-size: 9px; padding: 0 12px; }
        }
    </style>
</head>

<body>
    <!-- Background layers -->
    <div class="grid-bg"></div>
    <div class="noise-overlay"></div>
    <div class="scanline-overlay"></div>

    <!-- Floating particles -->
    <div id="particles"></div>

    <!-- Top system bar -->
    <div class="topbar">
        <div class="topbar-status">
            <div class="topbar-dot"></div>
            <span>SYS.OFFLINE</span>
            <span style="margin-left: 12px; color: rgba(255,255,255,0.2);">NAV:HALTED</span>
        </div>
        <span class="topbar-time" id="systemTime"></span>
    </div>

    <!-- Main content -->
    <div class="main-container">
        <div class="hud-card">
            <div class="hud-card-inner">

                <!-- Card header -->
                <div class="card-header-label">
                    <span class="system-label">SYS.MAINTENANCE &mdash; {{app_name}}</span>
                    <div class="status-badge">
                        <div class="status-badge-dot"></div>
                        <span>MAINTENANCE</span>
                    </div>
                </div>

                <!-- Uptime ring -->
                <div class="uptime-ring-container">
                    <div class="uptime-ring">
                        <svg viewBox="0 0 120 120">
                            <circle class="uptime-ring-bg" cx="60" cy="60" r="54"/>
                            <circle class="uptime-ring-fill" cx="60" cy="60" r="54"/>
                        </svg>
                        <div class="uptime-ring-label">
                            <span class="uptime-ring-value">0%</span>
                            <span class="uptime-ring-unit">UPTIME</span>
                        </div>
                    </div>
                </div>

                <!-- Status code -->
                <div class="status-code-container">
                    <div class="status-code">
                        <span class="digit">5</span><span class="digit">0</span><span class="digit">3</span>
                    </div>
                </div>

                <!-- Status title -->
                <div class="status-title">SYSTEMS OFFLINE</div>

                <!-- Glow separator -->
                <div class="glow-line"></div>

                <!-- Description -->
                <div class="status-description">
                    Application is currently undergoing scheduled maintenance. All services are temporarily unavailable.
                </div>

                <!-- Heartbeat animation bar -->
                <div class="heartbeat-bar">
                    <div class="heartbeat-bar-fill"></div>
                </div>

            </div>
        </div>
    </div>

    <script>
        /* ===== SYSTEM CLOCK ===== */
        (function clock() {
            var el = document.getElementById('systemTime');
            function tick() {
                var now = new Date();
                el.textContent = now.toUTCString().split(' ').slice(4).join(' ').replace(' GMT', ' UTC');
            }
            tick();
            setInterval(tick, 1000);
        })();

        /* ===== FLOATING PARTICLES ===== */
        (function createParticles() {
            var container = document.getElementById('particles');
            var count = 14;
            for (var i = 0; i < count; i++) {
                var p = document.createElement('div');
                p.className = 'particle';
                var size = Math.random() * 3 + 1;
                p.style.width = size + 'px';
                p.style.height = size + 'px';
                p.style.left = Math.random() * 100 + '%';
                p.style.bottom = '-10px';
                p.style.background = Math.random() > 0.5 ? 'var(--red)' : 'rgba(255,255,255,0.4)';
                p.style.boxShadow = '0 0 ' + (size * 2) + 'px ' + (Math.random() > 0.5 ? 'var(--red-glow)' : 'rgba(255,255,255,0.2)');
                p.style.animationDuration = (Math.random() * 15 + 10) + 's';
                p.style.animationDelay = (Math.random() * 10) + 's';
                container.appendChild(p);
            }
        })();
    </script>
</body>

</html>
